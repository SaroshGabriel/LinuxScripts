# ============================================================
# KJ's Aliases - Portable & Generic
# Compatible with: Arch Linux / Any Linux with bash
# Usage: Add this line to your ~/.bashrc:
#   source /path/to/aliases.conf
# Or append directly:
#   cat aliases.conf >> ~/.bashrc && source ~/.bashrc
# ============================================================


# ============================================================
# DYNAMIC BASE PATH
# Automatically detects the Projects directory.
# Works on any system regardless of username or home path.
# Change PROJECT_BASE to match your projects folder name.
# ============================================================
export PROJECT_BASE="$HOME/Projects"


# ============================================================
# META ALIAS MANAGEMENT
# addAlias "name=command" - adds a new alias to ~/.bashrc
# and immediately sources it so it's available right away.
# Usage: addAlias "myalias=echo hello"
# ============================================================
addAlias() {
    if [ -z "$1" ]; then
        echo "Usage: addAlias \"name=command\""
        return 1
    fi
    echo "alias $1" >> ~/.bashrc
    source ~/.bashrc
    echo "✅ Alias added and sourced: alias $1"
}

# aliases - lists all currently defined aliases in ~/.bashrc
# sorted alphabetically for easy reference
alias aliases='cat ~/.bashrc | grep "^alias" | sed "s/alias //" | sort'

# aliasgrep - search for a specific alias by keyword
# Usage: aliasgrep git
alias aliasgrep='grep -i --color=auto "alias" ~/.bashrc | grep'


# ============================================================
# NAVIGATION - PROJECT DIRECTORIES
# Uses $PROJECT_BASE so it works on any system.
# Just make sure PROJECT_BASE is set correctly above.
# ============================================================

# proj - go to the root of all projects
alias proj='cd "$PROJECT_BASE"'

# pyrev - go to Python revision/practice folder
alias pyrev='cd "$PROJECT_BASE/pythonRev"'

# bashrev - go to Bash revision/practice folder
alias bashrev='cd "$PROJECT_BASE/bashRev"'

# log - open the learning log markdown file in nano
# Change the filename if your log file has a different name
alias log='cd "$PROJECT_BASE/march-learning-log" && nano march_log.md'


# ============================================================
# TREE - DIRECTORY VISUALIZER
# treee <path> - shows a 2-level deep tree of any directory
# If no path given, shows current directory
# Usage: treee ~/Projects
#        treee (shows current folder)
# Requires: tree package (pacman -S tree)
# ============================================================
treee() {
    local target="${1:-.}"
    tree "$target" -L 2
}


# ============================================================
# PYTHON & JUPYTER
# Generic python shortcuts that work on any Linux system.
# ============================================================

# py - shorthand for python3
alias py='python3'

# venv-new - create a new virtual environment in current folder
# and activate it immediately
# Usage: venv-new
alias venv-new='python3 -m venv .venv && source .venv/bin/activate'

# venv - activate existing .venv in current directory
# Usage: venv
alias venv='source .venv/bin/activate'

# jup - launch Jupyter Lab in current directory
alias jup='jupyter lab'

# ipy - launch IPython interactive shell
alias ipy='ipython3'

# streamlit-run - run a streamlit app
# Usage: streamlit-run app.py
alias streamlit-run='streamlit run'

# pyreq - generate requirements.txt from current environment
alias pyreq='pip freeze > requirements.txt && echo "✅ requirements.txt generated"'

# pyinstall - install from requirements.txt
alias pyinstall='pip install -r requirements.txt'


# ============================================================
# GIT SHORTCUTS
# Generic git aliases that work on any repo/system.
# ============================================================

# gs - git status (quick overview of working tree)
alias gs='git status'

# ga - git add all changes in current directory
alias ga='git add .'

# gc - git commit with a message
# Usage: gc "your commit message"
alias gc='git commit -m'

# gp - git push to remote
alias gp='git push'

# gpl - git pull from remote
alias gpl='git pull'

# glog - visual git log showing branches and commits
alias glog='git log --oneline --graph --all'

# gday - daily progress commit: adds all, commits with timestamp, pushes
# Usage: gday
alias gday='git add . && git commit -m "Daily progress: $(date +%Y-%m-%d)" && git push'

# gundo - undo last commit but keep changes staged
alias gundo='git reset --soft HEAD~1'

# gclone - clone a repo into Projects directory
# Usage: gclone https://github.com/user/repo
alias gclone='git clone --recurse-submodules'

# gbranch - list all branches
alias gbranch='git branch -a'

# gswitch - switch to a branch
# Usage: gswitch branchname
alias gswitch='git checkout'

# gnew - create and switch to a new branch
# Usage: gnew feature-name
alias gnew='git checkout -b'


# ============================================================
# SYSTEM SHORTCUTS
# Generic system management aliases for any Linux distro.
# Pacman-specific ones are marked clearly.
# ============================================================

# c - clear terminal screen
alias c='clear'

# bye - shutdown the system
alias bye='systemctl poweroff'

# restart - reboot the system
alias restart='systemctl reboot'

# myip - show all IP addresses assigned to this machine
alias myip='hostname -I'

# ports - list connected serial/USB devices (for embedded work)
alias ports='ls /dev/tty{USB,ACM}* 2>/dev/null || echo "No serial devices found"'

# ll - detailed file listing with colors
alias ll='ls -la --color=auto'

# la - list all files including hidden
alias la='ls -A --color=auto'

# lss - list files sorted by size (largest first)
alias lss='ls -lSh --color=auto'

# lst - list files sorted by modification time (newest first)
alias lst='ls -lt --color=auto'

# mkdir - always create parent directories as needed
alias mkdir='mkdir -p'

# df - human readable disk usage
alias df='df -h'

# du - human readable directory size
alias du='du -sh'

# free - human readable memory usage
alias free='free -h'

# top - use htop if available, fallback to top
alias top='htop 2>/dev/null || top'


# ============================================================
# ARCH LINUX SPECIFIC (pacman)
# These aliases require pacman — Arch/Manjaro/EndeavourOS etc.
# Comment these out if using a different distro.
# ============================================================

# update - full system upgrade
alias update='sudo pacman -Syu'

# pacs - search for a package
# Usage: pacs firefox
alias pacs='pacman -Ss'

# pacr - remove a package and its unused dependencies
# Usage: pacr packagename
alias pacr='sudo pacman -Rns'

# paci - install a package (uses noconfirm)
# Usage: paci packagename
alias paci='sudo pacman -S --noconfirm'

# pacinfo - show package information
# Usage: pacinfo firefox
alias pacinfo='pacman -Qi'

# pacfiles - list files owned by a package
# Usage: pacfiles firefox
alias pacfiles='pacman -Ql'

# orphans - list orphaned packages (installed but no longer needed)
alias orphans='pacman -Qdtq'

# cleanup - remove orphaned packages
alias cleanup='sudo pacman -Rns $(pacman -Qdtq) 2>/dev/null || echo "No orphans found"'


# ============================================================
# HYPRLAND / WAYLAND SPECIFIC
# These require Hyprland + related tools.
# Comment out if using a different WM.
# ============================================================

# wb - restart waybar cleanly
alias wb='killall waybar; waybar & disown'

# snap - full screen screenshot saved to ~/Pictures
alias snap='hyprshot -m output -o ~/Pictures/ -s'

# snapr - region screenshot (select area with mouse)
alias snapr='hyprshot -m region -o ~/Pictures/ -s'

# wallpaper - change wallpaper using swww
# Usage: wallpaper ~/Pictures/mywallpaper.jpg
alias wallpaper='swww img'

